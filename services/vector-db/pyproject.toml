[tool.poetry]
name = "vector-db"
version = "0.1.0"
description = "FastAPI microservice for Milvus vector search operations"
authors = ["you <you@example.com>"]

[tool.poetry.dependencies]
python = ">=3.12,<3.13"  # FastEmbed requires <3.13
fastapi = "^0.110"
uvicorn = "^0.22"  # Removed [standard] extras for smaller image
pymilvus = "^2.3"
pydantic = "^2.0"
pydantic-settings = "^2.0"
fastembed = "^0.3"  # ONNX-based embeddings (much smaller than PyTorch)
numpy = "^2.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.0"
httpx = "^0.24"
pytest-asyncio = "^0.21"
pytest-cov = "^4.1"
pytest-mock = "^3.12"


[[tool.poetry.packages]]
include = "app"
from = "."

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
