# Example Kubernetes Secrets for AEGIS Scholar
#
# IMPORTANT: This is a template file. Do NOT commit actual secrets to version control.
#
# Usage:
# 1. Copy this file to secrets.yaml
# 2. Replace placeholder values with actual credentials
# 3. Apply with: kubectl apply -f secrets.yaml -n <namespace>
# 4. Add secrets.yaml to .gitignore
---
# Neo4j Authentication Secret
# Used by graph-db service to connect to Neo4j
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-auth
  namespace: aegis-dev # Change to your namespace
type: Opaque
stringData:
  NEO4J_AUTH_USER: "neo4j"
  NEO4J_AUTH_PASSWORD: "CHANGE_ME_TO_SECURE_PASSWORD"
  # For Neo4j Helm chart compatibility
  NEO4J_AUTH: "neo4j/CHANGE_ME_TO_SECURE_PASSWORD"
---
# Container Registry Secret (optional; only needed for private registries)
# Safe default for local dev: an empty docker config that applies cleanly.
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: aegis-dev # Change to your namespace
type: kubernetes.io/dockerconfigjson
stringData:
  # Replace this JSON with real registry credentials only if you need them.
  # For the built-in local registry flow, this secret is not required.
  .dockerconfigjson: |
    {
      "auths": {}
    }
