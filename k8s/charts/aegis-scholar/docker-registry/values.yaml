replicaCount: 1

image:
  repository: registry
  pullPolicy: IfNotPresent
  tag: "2.8.3"

service:
  type: LoadBalancer
  port: 5000

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Delete stored images when pod is deleted (good for local dev)
deleteDataOnUninstall: false
