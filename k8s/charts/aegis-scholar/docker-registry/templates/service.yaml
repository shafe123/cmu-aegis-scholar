apiVersion: v1
kind: Service
metadata:
  name: {{ include "docker-registry.fullname" . }}
  labels:
    {{- include "docker-registry.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: registry
    protocol: TCP
    name: registry
  selector:
    {{- include "docker-registry.selectorLabels" . | nindent 4 }}
