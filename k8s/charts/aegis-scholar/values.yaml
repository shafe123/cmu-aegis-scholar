# Global settings for all subcharts
global:
  # Container registry settings
  imageRegistry: "" # Override with your registry (e.g., myregistry.azurecr.io)
  imagePullSecrets: []
  storageClass: "" # Override with your storage class

  # Namespace to deploy to (can be overridden at install time)
  namespace: default

# Enable/disable components
aegis-scholar-api:
  enabled: true

vector-db:
  enabled: true

graph-db:
  enabled: true

milvus:
  enabled: true
  # Milvus standalone configuration
  cluster:
    enabled: false
  standalone:
    enabled: true
  etcd:
    replicaCount: 1
  minio:
    mode: standalone
  pulsar:
    enabled: false

# Traefik ingress configuration
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  hosts:
  - host: aegis-scholar.local
    paths:
    - path: /api
      pathType: Prefix
      service: aegis-scholar-api
      port: 8000
    - path: /vector
      pathType: Prefix
      service: vector-db
      port: 8002
  tls: []
  #  - secretName: aegis-scholar-tls
  #    hosts:
  #      - aegis-scholar.local
