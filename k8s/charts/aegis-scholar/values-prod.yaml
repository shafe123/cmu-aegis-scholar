# Production Environment Values
# Override with: helm install aegis-scholar ./charts/aegis-scholar -f values-prod.yaml -n aegis-prod

global:
  imageRegistry: "" # Set to your production registry (e.g., myregistry.azurecr.io)
  imagePullSecrets:
  - name: registry-credentials
  namespace: aegis-prod

# API service configuration
aegis-scholar-api:
  enabled: true
  replicaCount: 3
  image:
    tag: "latest"
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
  - name: LOG_LEVEL
    value: "info"
  - name: ENVIRONMENT
    value: "production"

# Vector DB configuration
vector-db:
  enabled: true
  replicaCount: 2
  image:
    tag: "latest"
  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 2000m
      memory: 4Gi
  persistence:
    enabled: true
    size: 50Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
  milvus:
    host: "aegis-scholar-milvus"

# Graph DB configuration
graph-db:
  enabled: true
  replicaCount: 2
  image:
    tag: "latest"
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
  neo4j:
    enabled: true
    volumes:
      data:
        defaultStorageClass:
          requests:
            storage: 50Gi
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi

# Milvus configuration (standalone but production-ready)
milvus:
  enabled: true
  cluster:
    enabled: false
  standalone:
    enabled: true
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
  persistence:
    enabled: true
    size: 100Gi

# Ingress configuration
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
  - host: api.aegis-scholar.com # Change to your production domain
    paths:
    - path: /api
      pathType: Prefix
      service: aegis-scholar-api
      port: 8000
    - path: /vector
      pathType: Prefix
      service: vector-db
      port: 8002
    - path: /graph
      pathType: Prefix
      service: graph-db
      port: 8003
  tls:
  - secretName: aegis-scholar-tls
    hosts:
    - api.aegis-scholar.com
