# Development Environment Values
# Override with: helm install aegis-scholar ./charts/aegis-scholar -f values-dev.yaml -n aegis-dev

global:
  imageRegistry: "" # Don't set global registry - it affects Milvus too
  namespace: aegis-dev

# Shared data volume for DTIC compressed data
dticData:
  enabled: true
  size: 20Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# Enable local Docker registry for development
docker-registry:
  enabled: true
  persistence:
    size: 10Gi

# API service configuration
aegis-scholar-api:
  enabled: true
  replicaCount: 1
  image:
    registry: "aegis-scholar-docker-registry.aegis-dev.svc.cluster.local"
    repository: "aegis-scholar-api"
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: true
    className: traefik
    hosts:
    - host: aegis-dev.local
      paths:
      - path: /
        pathType: Prefix
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  env:
  - name: LOG_LEVEL
    value: "DEBUG"
  - name: ENVIRONMENT
    value: "dev"

# Vector DB configuration
vector-db:
  enabled: true
  replicaCount: 1
  image:
    registry: "aegis-scholar-docker-registry.aegis-dev.svc.cluster.local"
    repository: "vector-db"
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 5Gi
  milvus:
    host: "aegis-scholar-milvus"
  loader:
    enabled: true
    image:
      registry: "aegis-scholar-docker-registry.aegis-dev.svc.cluster.local"
      repository: "vector-loader"
      tag: "latest"
      pullPolicy: IfNotPresent

# Graph DB configuration
graph-db:
  enabled: true
  replicaCount: 1
  image:
    registry: "aegis-scholar-docker-registry.aegis-dev.svc.cluster.local"
    repository: "graph-db"
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  neo4jConnection:
    host: "aegis-neo4j-lb-neo4j"
    port: "7687"
    scheme: "bolt"
    database: "neo4j"
  neo4j:
    enabled: true
    image:
      imagePullPolicy: IfNotPresent
      repository: "neo4j"
      tag: "5.25.1"
    volumes:
      data:
        defaultStorageClass:
          requests:
            storage: 5Gi
  loader:
    enabled: true
    image:
      registry: "aegis-scholar-docker-registry.aegis-dev.svc.cluster.local"
      repository: "graph-loader"
      tag: "latest"
      pullPolicy: IfNotPresent

# Milvus configuration (standalone for dev)
milvus:
  enabled: true
  cluster:
    enabled: false
  standalone:
    enabled: true
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

# Ingress configuration
ingress:
  enabled: true
  className: traefik
  hosts:
  - host: aegis-dev.local
    paths:
    - path: /api
      pathType: Prefix
      service: aegis-scholar-api
      port: 8000
    - path: /vector
      pathType: Prefix
      service: vector-db
      port: 8002
    - path: /graph
      pathType: Prefix
      service: graph-db
      port: 8003
