{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- $hasMiddleware := and (eq (.Values.ingress.className | default "") "traefik") (.Values.ingress.stripPrefixes) }}
  {{- if or .Values.ingress.annotations $hasMiddleware }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $hasMiddleware }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ printf "%s-%s-strip-prefixes@kubernetescrd" .Release.Namespace .Release.Name }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ printf "%s-%s" $.Release.Name .service | trunc 63 | trimSuffix "-" }}
                port:
                  number: {{ .port }}
          {{- end }}
    {{- end }}
{{- end }}
