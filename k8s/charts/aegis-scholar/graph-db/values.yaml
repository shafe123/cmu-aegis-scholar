# Default values for graph-db

replicaCount: 1

image:
  repository: graph-db
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8003

ingress:
  enabled: false
  className: traefik
  annotations: {}
  hosts:
  - host: aegis-scholar.local
    paths:
    - path: /graph
      pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Neo4j configuration
neo4j:
  enabled: true
  nameOverride: "neo4j"
  acceptLicenseAgreement: "yes"
  neo4j:
    name: aegis-neo4j
    edition: community
    # Password will be set via secret
    passwordFromSecret: neo4j-auth
  volumes:
    data:
      mode: defaultStorageClass
      defaultStorageClass:
        requests:
          storage: 10Gi
  services:
    neo4j:
      enabled: true
      ports:
        http:
          enabled: true
          port: 7474
        bolt:
          enabled: true
          port: 7687

# Connection to Neo4j
neo4jConnection:
  host: "aegis-scholar-neo4j-lb-neo4j" # Will match the neo4j service name
  port: "7687"
  scheme: "bolt"
  database: "neo4j"
  # Secret name for Neo4j auth credentials
  secretName: "neo4j-auth"
  usernameKey: "NEO4J_AUTH_USER"
  passwordKey: "NEO4J_AUTH_PASSWORD"

# Environment variables
env:
- name: PYTHONUNBUFFERED
  value: "1"
- name: LOG_LEVEL
  value: "info"

# Loader job configuration for graph-loader
loader:
  enabled: true
  image:
    repository: graph-loader
    tag: "latest"
    pullPolicy: IfNotPresent
  dataDir: "/data/dtic_compressed"
  env:
  - name: BATCH_SIZE
    value: "100"
  - name: LOG_LEVEL
    value: "INFO"
  - name: SKIP_IF_LOADED
    value: "true"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  ttlSecondsAfterFinished: 86400  # Clean up after 24 hours
  backoffLimit: 3

# Data volume configuration
dataVolume:
  existingClaim: "dtic-data"

# Environment variables from Neo4j connection
envFromValues:
- name: NEO4J_URI
  value: "{{ .Values.neo4jConnection.scheme }}://{{ .Values.neo4jConnection.host }}:{{ .Values.neo4jConnection.port }}"
- name: NEO4J_DATABASE
  value: "{{ .Values.neo4jConnection.database }}"

envFrom: []

# Health check configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
