{{- if .Values.loader.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vector-db.fullname" . }}-loader
  labels:
    {{- include "vector-db.labels" . | nindent 4 }}
    app.kubernetes.io/component: loader
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.loader.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.loader.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "vector-db.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: loader
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vector-db.serviceAccountName" . }}
      containers:
      - name: vector-loader
        image: {{ include "vector-db.loaderImage" . }}
        imagePullPolicy: {{ .Values.loader.image.pullPolicy }}
        env:
        - name: VECTOR_DB_URL
          value: "http://{{ include "vector-db.fullname" . }}:{{ .Values.service.port }}"
        - name: DATA_DIR
          value: {{ .Values.loader.dataDir | quote }}
        {{- with .Values.loader.env }}
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: dtic-data
          mountPath: /data/dtic_compressed
          readOnly: true
        resources:
          {{- toYaml .Values.loader.resources | nindent 10 }}
      volumes:
      - name: dtic-data
        persistentVolumeClaim:
          claimName: {{ .Values.dataVolume.existingClaim | default "dtic-data" }}
{{- end }}
