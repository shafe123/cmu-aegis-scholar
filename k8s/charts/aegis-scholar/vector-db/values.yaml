# Default values for vector-db

replicaCount: 1

image:
  repository: vector-db
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8002

ingress:
  enabled: false
  className: traefik
  annotations: {}
  hosts:
  - host: aegis-scholar.local
    paths:
    - path: /vector
      pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Milvus connection configuration
milvus:
  host: "aegis-scholar-milvus" # Will be set by parent chart
  port: "19530"
  collection: "aegis_vectors"

# Embedding model configuration
embedding:
  modelName: "sentence-transformers/all-MiniLM-L6-v2"
  cachePath: "/app/.cache"

# Persistent volume for model cache
persistence:
  enabled: true
  storageClass: "" # Use default storage class
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /app/.cache

# Environment variables
env:
- name: PYTHONUNBUFFERED
  value: "1"
- name: LOG_LEVEL
  value: "info"

# Loader job configuration for vector-loader
loader:
  enabled: true
  image:
    repository: vector-loader
    tag: "latest"
    pullPolicy: IfNotPresent
  dataDir: "/data/dtic_compressed"
  env:
  - name: BATCH_SIZE
    value: "100"
  - name: LOG_LEVEL
    value: "INFO"
  - name: SKIP_IF_LOADED
    value: "true"
  - name: COLLECTION_NAME
    value: "aegis_vectors"
  - name: EMBEDDING_MODEL
    value: "sentence-transformers/all-MiniLM-L6-v2"
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  ttlSecondsAfterFinished: 86400  # Clean up after 24 hours
  backoffLimit: 3

# Data volume configuration
dataVolume:
  existingClaim: "dtic-data"

# Environment variables from Milvus connection
envFromValues:
- name: MILVUS_HOST
  value: "{{ .Values.milvus.host }}"
- name: MILVUS_PORT
  value: "{{ .Values.milvus.port }}"
- name: DEFAULT_COLLECTION
  value: "{{ .Values.milvus.collection }}"
- name: EMBEDDING_MODEL_NAME
  value: "{{ .Values.embedding.modelName }}"

envFrom: []

# Health check configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
