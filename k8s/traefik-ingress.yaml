# Traefik Ingress Controller Configuration
#
# This creates an Ingress resource that routes traffic to the appropriate services.
# Traefik must be installed in your cluster for this to work.
#
# Apply with: kubectl apply -f traefik-ingress.yaml -n <namespace>
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: aegis-scholar-strip-prefixes
  namespace: aegis-dev # Change to your namespace
spec:
  stripPrefix:
    prefixes:
    - /api
    - /vector
    - /graph
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-scholar-ingress
  namespace: aegis-dev # Change to your namespace
  annotations:
    # Traefik-specific annotations
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: aegis-dev-aegis-scholar-strip-prefixes@kubernetescrd
    # Enable automatic TLS with Let's Encrypt (requires cert-manager)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: localhost # Change to your domain if needed
    http:
      paths:
      # API Service routes
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: aegis-scholar-aegis-scholar-api # Helm generates: <release>-<chart>
            port:
              number: 8000

      # Vector DB Service routes
      - path: /vector
        pathType: Prefix
        backend:
          service:
            name: aegis-scholar-vector-db
            port:
              number: 8002

      # Graph DB Service routes
      - path: /graph
        pathType: Prefix
        backend:
          service:
            name: aegis-scholar-graph-db
            port:
              number: 8003

      # Frontend route
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aegis-scholar-frontend
            port:
              number: 80
  # TLS configuration (optional, requires cert-manager or manual certificate)
  # tls:
  #   - hosts:
  #       - localhost
  #     secretName: aegis-scholar-tls
