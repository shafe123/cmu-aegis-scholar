name: CI

on:
    pull_request:
        branches: [ main ]
    push:
        branches: [ main ]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ---------------------------------------------------------------------------
    # PYTHON LINTING — ruff + pylint, parallel matrix with Poetry caching
    # Closes #32 (caching + pylint added to aegis-scholar-api)
    # ---------------------------------------------------------------------------
    lint-python:
        name: "Lint · ${{ matrix.name }}"
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: services/aegis-scholar-api
                      name: aegis-scholar-api
                    - service: services/graph-db
                      name: graph-db
                    - service: services/vector-db
                      name: vector-db
                    - service: services/identity
                      name: identity
        defaults:
            run:
                working-directory: ${{ matrix.service }}

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: pip install poetry --quiet

            - name: Lock dependencies
              run: poetry lock

            - name: Cache Poetry virtualenv
              uses: actions/cache@v5
              with:
                  path: ~/.cache/pypoetry
                  key: ${{ runner.os }}-poetry-${{ matrix.service }}-${{
                      hashFiles(format('{0}/poetry.lock', matrix.service)) }}
                  restore-keys: |
                      ${{ runner.os }}-poetry-${{ matrix.service }}-

            - name: Install dependencies
              run: poetry install --no-interaction --no-root

            - name: Ruff — lint
              run: poetry run ruff check .

            - name: Ruff — format check
              run: poetry run ruff format --check .

            - name: Pylint
              run: poetry run pylint app --fail-under=9.0

    # ---------------------------------------------------------------------------
    # SECURITY SCANS — bandit (SAST) + mypy (type checking), parallel matrix
    # Runs alongside lint-python (no dependency between them)
    # Closes #23 (bandit), #25 (mypy)
    # ---------------------------------------------------------------------------
    security-scan:
        name: "Security · ${{ matrix.name }}"
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: services/aegis-scholar-api
                      name: aegis-scholar-api
                    - service: services/graph-db
                      name: graph-db
                    - service: services/vector-db
                      name: vector-db
                    - service: services/identity
                      name: identity
        defaults:
            run:
                working-directory: ${{ matrix.service }}

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: pip install poetry --quiet

            - name: Lock dependencies
              run: poetry lock

            - name: Cache Poetry virtualenv
              uses: actions/cache@v5
              with:
                  path: ~/.cache/pypoetry
                  key: ${{ runner.os }}-poetry-${{ matrix.service }}-${{
                      hashFiles(format('{0}/poetry.lock', matrix.service)) }}
                  restore-keys: |
                      ${{ runner.os }}-poetry-${{ matrix.service }}-

            - name: Install dependencies
              run: poetry install --no-interaction --no-root

            # -ll = medium severity and above. Keeps noise low while catching real issues.
            - name: Bandit — SAST security scan
              run: poetry run bandit -r app/ -ll -f json -o bandit-report.json
              continue-on-error: true

            - name: Upload Bandit report
              uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: bandit-report-${{ matrix.name }}
                  path: ${{ matrix.service }}/bandit-report.json

            - name: Mypy — static type checking
              run: poetry run mypy app/ --ignore-missing-imports

    # ---------------------------------------------------------------------------
    # PYTHON TESTS — pytest with coverage reporting
    # Needs lint to pass first. Coverage threshold is 0 for aegis-scholar-api
    # until issue #33 (unit tests) is complete — raise to 80 after that PR merges.
    # ---------------------------------------------------------------------------
    test-python:
        name: "Tests · ${{ matrix.name }}"
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: services/aegis-scholar-api
                      name: aegis-scholar-api
                    - service: services/graph-db
                      name: graph-db
                    - service: services/vector-db
                      name: vector-db
                    - service: services/identity
                      name: identity
        defaults:
            run:
                working-directory: ${{ matrix.service }}

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: pip install poetry --quiet

            - name: Lock dependencies
              run: poetry lock

            - name: Cache Poetry virtualenv
              uses: actions/cache@v5
              with:
                  path: ~/.cache/pypoetry
                  key: ${{ runner.os }}-poetry-${{ matrix.service }}-${{
                      hashFiles(format('{0}/poetry.lock', matrix.service)) }}
                  restore-keys: |
                      ${{ runner.os }}-poetry-${{ matrix.service }}-

            - name: Install dependencies
              run: poetry install --no-interaction

            # TODO (#33): raise aegis-scholar-api threshold to 80 once unit tests are written
            - name: Run tests with coverage
              run: poetry run pytest tests/ -v --tb=short --cov=app --cov-report=xml
                  --cov-fail-under=80

            - name: Upload coverage report
              uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: coverage-report-${{ matrix.name }}
                  path: ${{ matrix.service }}/coverage.xml

    # ---------------------------------------------------------------------------
    # INTEGRATION / E2E TESTS
    # ---------------------------------------------------------------------------
    test-integration:
        name: "Tests · integration (root)"
        runs-on: ubuntu-latest
        needs: [ test-python, lint-and-test-frontend ]
        defaults:
            run:
                working-directory: tests

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: pip install poetry --quiet

            - name: Lock dependencies
              run: poetry lock

            - name: Cache Poetry virtualenv
              uses: actions/cache@v5
              with:
                  path: ~/.cache/pypoetry
                  key: ${{ runner.os }}-poetry-integration-${{ hashFiles('tests/poetry.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-poetry-integration-

            - name: Install dependencies
              run: poetry install --no-interaction

            - name: Run integration tests
              run: poetry run pytest . -v --tb=short -m "not requires_docker"

    # ---------------------------------------------------------------------------
    # DOCKER SCOUT — CVE scan, critical/high severity only
    # Runs on PRs and manual triggers. No need to scan on every push to main.
    # Requires DOCKERHUB_USERNAME + DOCKERHUB_TOKEN in repo secrets.
    # Closes #20
    # ---------------------------------------------------------------------------
    docker-scout:
        name: "Docker Scout · ${{ matrix.image }}"
        runs-on: ubuntu-latest
        if: |
            github.event_name == 'pull_request' ||
            github.event_name == 'workflow_dispatch'
        permissions:
            contents: read
            pull-requests: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: services/aegis-scholar-api
                      image: aegis-scholar-api
                    - service: services/graph-db
                      image: graph-db
                    - service: services/vector-db
                      image: vector-db
                    - service: services/identity
                      image: identity

        steps:
            - uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build image with cache
              uses: docker/build-push-action@v7
              with:
                  context: ${{ matrix.service }}
                  load: true
                  tags: ${{ matrix.image }}:ci
                  cache-from: type=gha,scope=${{ matrix.image }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.image }}

            - name: Docker Scout — critical/high CVEs only
              uses: docker/scout-action@v1
              with:
                  command: cves
                  image: local://${{ matrix.image }}:ci
                  only-severities: critical,high
                  exit-code: false
                  sarif-file: ${{ matrix.service }}/scout-report.json
                  write-comment: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
              continue-on-error: true

            - name: Upload Docker Scout report
              uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: docker-scout-report-${{ matrix.image }}
                  path: ${{ matrix.service }}/scout-report.json
                  if-no-files-found: warn

    # ---------------------------------------------------------------------------
    # FRONTEND — lint, build, test (unchanged)
    # ---------------------------------------------------------------------------
    lint-and-test-frontend:
        name: "Lint + Test · frontend"
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: ESLint
              run: npm run lint

            - name: Build
              run: npm run build

            - name: Vitest
              run: npm run test -- --run
