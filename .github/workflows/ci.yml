name: CI

# Runs on every PR targeting main, and on direct pushes to main.
# Direct pushes to main should eventually be disabled in branch protection
# once the team is comfortable with the PR-only workflow.
on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

# Cancel any in-progress run for the same branch when a new commit is pushed.
# Prevents stale CI runs from blocking merges.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ---------------------------------------------------------------------------
    # PYTHON LINTING
    # Runs ruff (style/imports) and pylint (logic) for each backend service.
    # Uses a matrix so all three services run in parallel.
    # ---------------------------------------------------------------------------
    lint-python:
        name: "Lint · ${{ matrix.service }}"
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false # Let all three services report, don't stop on first failure
            matrix:
                service:
                    - services/aegis-scholar-api
                    - services/graph-db
                    - services/vector-db
        defaults:
            run:
                working-directory: ${{ matrix.service }}

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: pip install poetry --quiet

            - name: Cache Poetry dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pypoetry
                      ~/.cache/pip
                  key: poetry-${{ runner.os }}-${{ matrix.service }}-${{ hashFiles(format('{0}/poetry.lock', matrix.service)) }}
                  restore-keys: |
                      poetry-${{ runner.os }}-${{ matrix.service }}-
                      poetry-${{ runner.os }}-

            - name: Install dependencies
              run: poetry install --no-interaction

            - name: Ruff — lint
              run: poetry run ruff check .

            - name: Ruff — format check
              run: poetry run ruff format --check .

            # --fail-under=9.0 matches the ">9.0 acceptable score" from the PR checklist.
            # Pylint only checks the app/ package to avoid scanning test files.
            - name: Pylint
              run: poetry run pylint app --fail-under=9.0

    # ---------------------------------------------------------------------------
    # PYTHON TESTS
    # Runs pytest for each service after linting passes.
    # All tests are either fully mocked or live-tolerant (accept 200/404/500),
    # so no live Milvus or Neo4j connection is required.
    # ---------------------------------------------------------------------------
    test-python:
        name: "Tests · ${{ matrix.service }}"
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                service:
                    - services/aegis-scholar-api
                    - services/graph-db
                    - services/vector-db
        defaults:
            run:
                working-directory: ${{ matrix.service }}

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: pip install poetry --quiet

            - name: Cache Poetry dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pypoetry
                      ~/.cache/pip
                  key: poetry-${{ runner.os }}-${{ matrix.service }}-${{ hashFiles(format('{0}/poetry.lock', matrix.service)) }}
                  restore-keys: |
                      poetry-${{ runner.os }}-${{ matrix.service }}-
                      poetry-${{ runner.os }}-

            - name: Install dependencies
              run: poetry install --no-interaction

            - name: Run tests with coverage
              run: poetry run pytest tests/ -v --tb=short --cov=app --cov-report=term --cov-report=xml --cov-fail-under=80

            - name: Upload coverage report
              uses: codecov/codecov-action@v4
              if: always()
              with:
                  files: ${{ matrix.service }}/coverage.xml
                  flags: ${{ matrix.service }}
                  fail_ci_if_error: false

    # ---------------------------------------------------------------------------
    # INTEGRATION / E2E TESTS (root tests/ directory)
    # These are currently all placeholder tests (assert True).
    # This job is here so the infrastructure exists when real tests are added.
    # The root tests/ folder has its own pyproject.toml and poetry.lock.
    # ---------------------------------------------------------------------------
    test-integration:
        name: "Tests · integration (root)"
        runs-on: ubuntu-latest
        needs: test-python
        defaults:
            run:
                working-directory: tests

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: pip install poetry --quiet

            - name: Cache Poetry dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pypoetry
                      ~/.cache/pip
                  key: poetry-${{ runner.os }}-tests-${{ hashFiles('tests/poetry.lock') }}
                  restore-keys: |
                      poetry-${{ runner.os }}-tests-
                      poetry-${{ runner.os }}-

            - name: Install dependencies
              run: poetry install --no-interaction --no-root

            # -m "not requires_docker" skips any tests that need testcontainers/Docker.
            # Remove that marker exclusion once containers are wired up.
            - name: Run integration tests
              run: poetry run pytest . -v --tb=short -m "not requires_docker"

    # ---------------------------------------------------------------------------
    # FRONTEND — LINT, BUILD, TEST
    # ESLint + Vite build + Vitest unit tests.
    # --run tells Vitest to run once and exit (not in watch mode).
    # ---------------------------------------------------------------------------
    lint-and-test-frontend:
        name: "Lint + Test · frontend"
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: ESLint
              run: npm run lint

            - name: Build
              run: npm run build

            - name: Vitest
              run: npm run test -- --run
