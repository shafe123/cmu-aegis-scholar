name: Release

on:
    release:
        types: [ published ]
    workflow_dispatch:
        inputs:
            version:
                description: "Version to release (e.g., 1.0.0)"
                required: true
                type: string

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    # ---------------------------------------------------------------------------
    # UPDATE VERSIONS — Extract version from release tag and update all files
    # ---------------------------------------------------------------------------
    update-versions:
        name: "Update Version Numbers"
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            version: ${{ steps.get_version.outputs.VERSION }}

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Get version from release or input
              id: get_version
              run: |
                  if [ "${{ github.event_name }}" == "release" ]; then
                    VERSION="${{ github.event.release.tag_name }}"
                    VERSION="${VERSION#v}"  # Remove 'v' prefix if present
                  else
                    VERSION="${{ inputs.version }}"
                  fi
                  echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
                  echo "Release version: ${VERSION}"

            - name: Update root package.json
              run: |
                  jq --arg v "${{ steps.get_version.outputs.VERSION }}" '.version = $v' package.json > package.json.tmp
                  mv package.json.tmp package.json
                  echo "Updated package.json to version ${{ steps.get_version.outputs.VERSION }}"

            - name: Update frontend package.json
              run: |
                  jq --arg v "${{ steps.get_version.outputs.VERSION }}" '.version = $v' frontend/package.json > frontend/package.json.tmp
                  mv frontend/package.json.tmp frontend/package.json
                  echo "Updated frontend/package.json to version ${{ steps.get_version.outputs.VERSION }}"

            - name: Update Python service versions
              run: |
                  VERSION="${{ steps.get_version.outputs.VERSION }}"

                  # Update all service pyproject.toml files
                  for service in services/aegis_scholar_api services/graph-db services/vector-db services/identity; do
                    if [ -f "$service/pyproject.toml" ]; then
                      sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" "$service/pyproject.toml"
                      echo "Updated $service/pyproject.toml to version ${VERSION}"
                    fi
                  done

                  # Update job pyproject.toml files
                  for job in jobs/graph-loader jobs/vector-loader; do
                    if [ -f "$job/pyproject.toml" ]; then
                      sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" "$job/pyproject.toml"
                      echo "Updated $job/pyproject.toml to version ${VERSION}"
                    fi
                  done

            - name: Update integration tests pyproject.toml
              run: |
                  VERSION="${{ steps.get_version.outputs.VERSION }}"
                  if [ -f "tests/pyproject.toml" ]; then
                    sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" "tests/pyproject.toml"
                    echo "Updated tests/pyproject.toml to version ${VERSION}"
                  fi

            - name: Commit and push version updates
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add package.json frontend/package.json services/*/pyproject.toml jobs/*/pyproject.toml tests/pyproject.toml
                  git commit -m "chore: bump version to ${{ steps.get_version.outputs.VERSION }}" || echo "No changes to commit"
                  git push origin HEAD:main

    # ---------------------------------------------------------------------------
    # BUILD AND PUBLISH IMAGES — Build all images and push to GHCR
    # ---------------------------------------------------------------------------
    publish-images:
        name: "Publish · ${{ matrix.image }}"
        runs-on: ubuntu-latest
        needs: [ update-versions ]
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: services/aegis_scholar_api
                      image: aegis-scholar-api
                    - service: services/graph-db
                      image: graph-db
                    - service: services/vector-db
                      image: vector-db
                    - service: services/identity
                      image: identity
                    - service: frontend
                      image: frontend
                    - service: jobs/graph-loader
                      image: graph-loader
                    - service: jobs/vector-loader
                      image: vector-loader

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: main # Checkout main to get the version updates

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract image metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
                  tags: |
                      type=semver,pattern={{version}},value=${{ needs.update-versions.outputs.version }}
                      type=semver,pattern={{major}}.{{minor}},value=${{ needs.update-versions.outputs.version }}
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push to GHCR
              uses: docker/build-push-action@v7
              with:
                  context: ${{ matrix.service }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.image }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.image }}
                  provenance: true
                  sbom: true

    # ---------------------------------------------------------------------------
    # UPDATE RELEASE NOTES — Add build information to release notes
    # ---------------------------------------------------------------------------
    update-release-notes:
        name: "Update Release Notes"
        runs-on: ubuntu-latest
        needs: [ update-versions, publish-images ]
        if: github.event_name == 'release'
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v6

            - name: Update release with build info
              uses: actions/github-script@v7
              with:
                  script: |
                      const version = "${{ needs.update-versions.outputs.version }}";
                      const releaseId = context.payload.release.id;

                      const images = [
                        'aegis-scholar-api',
                        'graph-db',
                        'vector-db',
                        'identity',
                        'frontend',
                        'graph-loader',
                        'vector-loader'
                      ];

                      let body = context.payload.release.body || '';
                      body += '\n\n## 📦 Published Container Images\n\n';
                      body += 'The following images have been published to GitHub Container Registry:\n\n';

                      for (const image of images) {
                        body += `- \`ghcr.io/${{ github.repository_owner }}/${image}:${version}\`\n`;
                      }

                      body += '\n### Pull images\n\n';
                      body += '```bash\n';
                      for (const image of images) {
                        body += `docker pull ghcr.io/${{ github.repository_owner }}/${image}:${version}\n`;
                      }
                      body += '```\n';

                      await github.rest.repos.updateRelease({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        release_id: releaseId,
                        body: body
                      });
