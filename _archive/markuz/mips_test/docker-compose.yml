services:
  ldap-server:
    image: symas/openldap:latest
    container_name: ldap-server
    environment:
      - LDAP_ROOT=dc=example,dc=org
      - LDAP_ADMIN_USERNAME=admin
      - LDAP_ADMIN_PASSWORD=admin
      # Automatically creates the 'ou=users' branch on first boot
      - LDAP_USER_DC=users
      - LDAP_PORT_NUMBER=1389
    volumes:
      - ./ldap_data:/var/lib/ldap
      - ./ldap_config:/etc/openldap/slapd.d
    ports:
      - "1389:1389"
    restart: unless-stopped

  api-gateway:
    build: .
    container_name: api-gateway
    environment:
      - LDAP_SERVER=ldap://ldap-server:1389
      - LDAP_ADMIN_DN=cn=admin,dc=example,dc=org
      - LDAP_ADMIN_PASSWORD=admin
      - JSONL_FILE_PATH=/data/dtic_authors_001.jsonl.gz
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      - ldap-server
    restart: unless-stopped

