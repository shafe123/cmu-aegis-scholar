networks:
  aegisnet:
    driver: bridge

services:
  milvus-etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.6.9
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus-etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - aegisnet
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-seaweedfs:
    container_name: milvus-seaweedfs
    image: chrislusf/seaweedfs:latest
    environment:
      WEED_MASTER_VOLUME_SIZE_LIMIT_MB: 1024
    ports:
      - "8333:8333" # S3 API
      - "9333:9333" # Master server
      - "8080:8080" # Filer
    volumes:
      - seaweedfs-data:/data
    command: "server -s3 -dir=/data -s3.port=8333"
    networks:
      - aegisnet
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:9333/cluster/status",
        ]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.13
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-seaweedfs:8333
    volumes:
      - milvus-standalone:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "milvus-etcd"
      - "milvus-seaweedfs"
    networks:
      - aegisnet

  vector-db:
    build: ../services/vector-db
    ports:
      - 8002:8002
    environment:
      - PYTHONUNBUFFERED=1
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - DEFAULT_COLLECTION=aegis_vectors
    volumes:
      - model-cache:/app/.cache
    depends_on:
      - milvus-standalone
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - aegisnet

  vector-loader:
    build: ../jobs/vector-loader
    environment:
      - PYTHONUNBUFFERED=1
      - VECTOR_DB_URL=http://vector-db:8002
      - VECTOR_DB_TIMEOUT=300
      - DATA_DIR=/data/dtic_compressed
      - COLLECTION_NAME=aegis_vectors
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - BATCH_SIZE=100
      - SKIP_IF_LOADED=true
      - MIN_ENTITIES_THRESHOLD=100
      - LOG_LEVEL=INFO
    volumes:
      - ../data:/data
      - model-cache:/app/.cache
    depends_on:
      vector-db:
        condition: service_healthy
    restart: "no" # Only run once
    networks:
      - aegisnet

   # --- GRAPH STACK (NEW) ---
  neo4j:
    container_name: neo4j
    image: neo4j:5.12
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aegisnet

  graph-db:
    build: ../services/graph-db
    ports:
      - 8003:8003
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aegisnet


  # --- GRAPH LOADER (NEW) ---
  graph-loader:
    build: ../jobs/graph-loader
    environment:
      - GRAPH_API_URL=http://graph-db:8003
      - DATA_DIR=/data/dtic_compressed
      - SKIP_IF_LOADED=true
      - MIN_ENTITIES_THRESHOLD=100
    volumes:
      - ../data:/data
    depends_on:
      graph-db:
        condition: service_healthy
    restart: "no"
    networks:
      - aegisnet

  aegis-scholar-api:
    build: ../services/aegis-scholar-api
    ports:
      - 8000:8000
    environment:
      - PYTHONUNBUFFERED=1
      - VECTOR_DB_URL=http://vector-db:8002
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
    depends_on:
      - vector-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aegisnet

volumes:
  milvus-etcd:
  seaweedfs-data:
  milvus-standalone:
  model-cache:
  neo4j-data:
  neo4j-logs:
