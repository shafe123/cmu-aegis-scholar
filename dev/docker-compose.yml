networks:
  aegisnet:
    driver: bridge

services:
  milvus-etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus-etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - aegisnet
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - milvus-minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - aegisnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus-standalone:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "milvus-etcd"
      - "milvus-minio"
    networks:
      - aegisnet

  vector-db:
    build: ../services/vector-db
    ports:
      - 8002:8002
    environment:
      - PYTHONUNBUFFERED=1
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - DEFAULT_COLLECTION=aegis_vectors
    depends_on:
      - milvus-standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - aegisnet

  vector-loader:
    build: ../jobs/vector-loader
    environment:
      - PYTHONUNBUFFERED=1
      - VECTOR_DB_URL=http://vector-db:8002
      - VECTOR_DB_TIMEOUT=300
      - DATA_DIR=/data/dtic_compressed
      - COLLECTION_NAME=aegis_vectors
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - BATCH_SIZE=100
      - SKIP_IF_LOADED=true
      - MIN_ENTITIES_THRESHOLD=100
      - LOG_LEVEL=INFO
    volumes:
      - ../data:/data
    depends_on:
      vector-db:
        condition: service_healthy
    restart: "no" # Only run once
    networks:
      - aegisnet

  aegis-scholar-api:
    build: ../services/aegis-scholar-api
    ports:
      - 8000:8000
    environment:
      - PYTHONUNBUFFERED=1
      - VECTOR_DB_URL=http://vector-db:8002
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
    depends_on:
      - vector-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aegisnet

volumes:
  milvus-etcd:
  milvus-minio:
  milvus-standalone:
