networks:
  aegisnet:
    driver: bridge

services:
  milvus-etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.6.9
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus-etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls
      http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - aegisnet
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-seaweedfs:
    container_name: milvus-seaweedfs
    image: chrislusf/seaweedfs:latest
    environment:
      WEED_MASTER_VOLUME_SIZE_LIMIT_MB: 1024
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_SECRET_KEY}
    ports:
      - "8333:8333" # S3 API
      - "9333:9333" # Master server
      - "8080:8080" # Filer
    volumes:
      - seaweedfs-data:/data
    command: "server -s3 -dir=/data -s3.port=8333"
    networks:
      - aegisnet
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9333/cluster/status" ]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.13
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-seaweedfs:8333
      MINIO_ACCESS_KEY: ${SEAWEEDFS_ACCESS_KEY}
      MINIO_SECRET_KEY: ${SEAWEEDFS_SECRET_KEY}
      MINIO_USE_SSL: "false"
    volumes:
      - milvus-standalone:/var/lib/milvus
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "milvus-etcd"
      - "milvus-seaweedfs"
    networks:
      - aegisnet

  vector-db:
    build: ../services/vector-db
    ports:
      - 8002:8002
    environment:
      - PYTHONUNBUFFERED=1
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - DEFAULT_COLLECTION=aegis_vectors
    volumes:
      - model-cache:/app/.cache
    depends_on:
      - milvus-standalone
    healthcheck:
      test: python -c "import urllib.request;
        urllib.request.urlopen('http://127.0.0.1:8002/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - aegisnet

  vector-loader:
    build: ../jobs/vector-loader
    environment:
      - PYTHONUNBUFFERED=1
      - VECTOR_DB_URL=http://vector-db:8002
      - VECTOR_DB_TIMEOUT=300
      - DATA_DIR=/data/dtic_compressed
      - COLLECTION_NAME=aegis_vectors
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - BATCH_SIZE=100
      - SKIP_IF_LOADED=true
      - MIN_ENTITIES_THRESHOLD=100
      - LOG_LEVEL=INFO
    volumes:
      - ${DTIC_DATASET_DIR:-../tests/dtic_test_subset}:/data/dtic_compressed
      - model-cache:/app/.cache
    depends_on:
      vector-db:
        condition: service_healthy
    restart: "no" # Only run once
    networks:
      - aegisnet

  # --- GRAPH STACK (NEW) ---
  neo4j:
    container_name: neo4j
    image: neo4j:5.12
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1'" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aegisnet

  graph-db:
    build: ../services/graph-db
    ports:
      - 8003:8003
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request;
        urllib.request.urlopen('http://127.0.0.1:8003/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aegisnet

  graph-loader:
    build: ../jobs/graph-loader
    environment:
      - GRAPH_API_URL=http://graph-db:8003
      - DATA_DIR=/data/dtic_compressed
      - SKIP_IF_LOADED=true
      - MIN_ENTITIES_THRESHOLD=100
    volumes:
      - ${DTIC_DATASET_DIR:-../tests/dtic_test_subset}:/data/dtic_compressed
    depends_on:
      graph-db:
        condition: service_healthy
    restart: "no"
    networks:
      - aegisnet

  aegis-scholar-api:
    build: ../services/aegis_scholar_api
    ports:
      - 8000:8000
    environment:
      - PYTHONUNBUFFERED=1
      - VECTOR_DB_URL=http://vector-db:8002
      - GRAPH_DB_URL=http://graph-db:8003
      - GRAPH_DB_TIMEOUT=30
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
    depends_on:
      - vector-db
    healthcheck:
      test: python -c "import urllib.request;
        urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aegisnet

  frontend:
    build:
      context: ../frontend
      target: production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../dev/certs:/etc/nginx/certs:ro
    depends_on:
      - aegis-scholar-api
    networks:
      - aegisnet

  ldap-server:
    image: symas/openldap:latest
    container_name: ldap-server
    environment:
      - LDAP_ROOT=dc=example,dc=org
      - LDAP_ADMIN_USERNAME=admin
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - LDAP_PORT_NUMBER=1389
      - LDAP_MDB_MAPSIZE=2147483648
    volumes:
      - ldap-data:/var/symas/openldap-data/
      - ldap-config:/opt/symas/etc/openldap/slapd.d/
    ports:
      - "1389:1389"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ldapsearch -x -H ldap://127.0.0.1:1389 -D
            'cn=admin,dc=example,dc=org' -w \"$LDAP_ADMIN_PASSWORD\" -b
            'dc=example,dc=org' -s base >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - aegisnet

  identity:
    build: ../services/identity
    container_name: identity
    environment:
      - LDAP_SERVER=ldap://ldap-server:1389
      - LDAP_ADMIN_DN=cn=admin,dc=example,dc=org
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - LDAP_BASE_DN=dc=example,dc=org
      - AUTH_JSONL_FILE_PATH=/data/${IDENTITY_AUTH_JSONL_FILE:-dtic_authors_50.jsonl.gz}
      - ORG_JSONL_FILE_PATH=/data/${IDENTITY_ORG_JSONL_FILE:-dtic_orgs_50.jsonl.gz}
      - IDENTITY_URL=http://identity-api:8005
    volumes:
      - ${DTIC_DATASET_DIR:-../tests/dtic_test_subset}:/data
    ports:
      - "8005:8000"
    depends_on:
      ldap-server:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request;
        urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - aegisnet

volumes:
  milvus-etcd:
  seaweedfs-data:
  milvus-standalone:
  model-cache:
  neo4j-data:
  neo4j-logs:
  ldap-data:
  ldap-config:
